# ==============================================================================
# HolyClaude — Quick Start
# Just run: docker compose up -d
# Then open: http://localhost:3001
# ==============================================================================

services:
  holyclaude:
    image: coderluii/holyclaude:latest
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: holyclaude
    hostname: holyclaude
    restart: unless-stopped
    shm_size: 2g
    network_mode: bridge
    cap_add:
      - SYS_PTRACE      # Required for debugging
    # SYS_ADMIN and seccomp=unconfined intentionally removed.
    # Chromium runs with --no-sandbox (configured in CHROMIUM_FLAGS).
    # This improves the container's security profile.
    ports:
      - "3001:3001"     # CloudCLI web UI
    volumes:
      - ./data/claude:/home/claude/.claude:Z
      - ./workspace:/workspace:Z
    environment:
      - TZ=UTC          # Change to your timezone
